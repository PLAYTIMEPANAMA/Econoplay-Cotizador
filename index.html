<style>
  :root {

    --primary-dark: #E05A00;

    --accent: #4CAF50;
    --bg: #F5F7FA;
    --card-bg: #FFFFFF;
    --text: #2C3E50;
    --text-light: #6B7280;
    --border: #E5E7EB;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
    --shadow-hover: 0 6px 20px rgba(0,0,0,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  header { background: var(--secondary); color: white; padding: 0; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.2); }
  .header-inner { max-width: 1400px; margin: 0 auto; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon { width: 44px; height: 44px; background: var(--primary); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
  .logo-text h1 { font-size: 20px; font-weight: 800; letter-spacing: 1px; color: white; }
  .logo-text p { font-size: 11px; color: rgba(255,255,255,0.65); letter-spacing: 0.5px; }
  .cart-btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: all 0.2s; white-space: nowrap; }
  .cart-btn:hover { background: var(--primary-dark); transform: translateY(-1px); }
  .cart-count { background: white; color: var(--primary); border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; }
  .container { max-width: 1400px; margin: 0 auto; padding: 24px; display: grid; grid-template-columns: 1fr 360px; gap: 24px; align-items: start; }
  .catalog-section { min-width: 0; }
  .filter-bar { background: white; border-radius: 16px; padding: 16px; margin-bottom: 20px; box-shadow: var(--shadow); display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap::before { content: '🔍'; position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 14px; }
  .search-input { width: 100%; padding: 10px 16px 10px 40px; border: 1.5px solid var(--border); border-radius: 50px; font-size: 14px; outline: none; transition: border 0.2s; }
  .search-input:focus { border-color: var(--primary); }
  .filter-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
  .tab-btn { padding: 8px 16px; border-radius: 50px; border: 1.5px solid var(--border); background: white; font-size: 13px; cursor: pointer; transition: all 0.2s; font-weight: 500; color: var(--text-light); white-space: nowrap; }
  .tab-btn.active { background: var(--secondary); border-color: var(--secondary); color: white; }
  .tab-btn:hover:not(.active) { border-color: var(--primary); color: var(--primary); }
  .category-group { margin-bottom: 28px; }
  .category-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 2px solid var(--border); }
  .category-icon { font-size: 22px; }
  .category-name { font-size: 17px; font-weight: 700; color: var(--secondary); text-transform: uppercase; letter-spacing: 0.5px; }
  .category-count { font-size: 12px; color: white; background: var(--primary); padding: 2px 8px; border-radius: 50px; font-weight: 600; }
  .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
  .product-card { background: white; border-radius: 14px; overflow: hidden; box-shadow: var(--shadow); transition: all 0.25s; display: flex; flex-direction: column; border: 2px solid transparent; }
  .product-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-3px); }
  .product-card.in-cart { border-color: var(--accent); }
  .product-img { height: 160px; background: #f0f4f8; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  .product-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease; }
  .product-card:hover .product-img img { transform: scale(1.05); }
  .product-badge { position: absolute; top: 8px; right: 8px; background: var(--accent); color: white; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 50px; }
  .product-body { padding: 12px; flex: 1; display: flex; flex-direction: column; }
  .product-name { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 4px; line-height: 1.3; }
  .product-price { font-size: 16px; font-weight: 800; color: var(--primary); margin-top: auto; padding-top: 8px; }
  .product-price span { font-size: 11px; font-weight: 500; color: var(--text-light); }
  .product-controls { padding: 10px 12px 12px; display: flex; align-items: center; gap: 8px; }
  .qty-wrapper { display: flex; align-items: center; gap: 6px; flex: 1; }
  .qty-btn { width: 30px; height: 30px; border-radius: 50%; border: 1.5px solid var(--border); background: white; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; font-weight: 700; color: var(--text); }
  .qty-btn:hover { border-color: var(--primary); color: var(--primary); }
  .qty-input { width: 40px; text-align: center; border: 1.5px solid var(--border); border-radius: 8px; padding: 4px; font-size: 14px; font-weight: 700; outline: none; }
  .qty-input:focus { border-color: var(--primary); }
  .add-btn { background: var(--secondary); color: white; border: none; padding: 8px 14px; border-radius: 50px; cursor: pointer; font-size: 12px; font-weight: 700; transition: all 0.2s; white-space: nowrap; }
  .add-btn:hover { background: var(--primary); }
  .add-btn.added { background: var(--accent); }
  .add-btn.added:hover { background: #388E3C; }
  .no-results { text-align: center; padding: 40px; color: var(--text-light); font-size: 15px; grid-column: 1/-1; }
  .sidebar { position: sticky; top: 80px; display: flex; flex-direction: column; gap: 16px; }
  .cart-panel { background: white; border-radius: 16px; box-shadow: var(--shadow); overflow: hidden; }
  .panel-header { background: var(--secondary); color: white; padding: 16px 20px; font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .cart-items { max-height: 280px; overflow-y: auto; padding: 12px; }
  .cart-items:empty::after { content: 'No hay productos seleccionados'; display: block; text-align: center; color: var(--text-light); font-size: 13px; padding: 20px; }
  .cart-item { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: 10px; margin-bottom: 6px; background: var(--bg); font-size: 13px; }
  .cart-item-info { flex: 1; min-width: 0; }
  .cart-item-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cart-item-sub { color: var(--text-light); font-size: 11px; }
  .cart-item-price { font-weight: 700; color: var(--primary); white-space: nowrap; }
  .cart-remove { background: none; border: none; cursor: pointer; color: #EF4444; font-size: 16px; padding: 2px; line-height: 1; }
  .cart-total { padding: 14px 20px; border-top: 2px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .total-label { font-size: 14px; font-weight: 600; color: var(--text-light); }
  .total-value { font-size: 22px; font-weight: 800; color: var(--secondary); }
  .form-panel { background: white; border-radius: 16px; box-shadow: var(--shadow); overflow: hidden; }
  .form-body { padding: 16px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-light); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-group input, .form-group textarea { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; outline: none; transition: border 0.2s; font-family: inherit; color: var(--text); }
  .form-group input:focus, .form-group textarea:focus { border-color: var(--primary); }
  .form-group textarea { resize: vertical; min-height: 70px; }
  .whatsapp-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 16px; background: #25D366; color: white; border: none; border-radius: 14px; font-size: 16px; font-weight: 800; cursor: pointer; transition: all 0.25s; text-decoration: none; letter-spacing: 0.3px; }
  .whatsapp-btn:hover { background: #1DA851; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(37,211,102,0.4); }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; }
  .overlay.open { display: block; }
  .mobile-sidebar { position: fixed; right: 0; top: 0; bottom: 0; width: min(360px, 100vw); background: var(--bg); z-index: 201; overflow-y: auto; padding: 16px; transform: translateX(100%); transition: transform 0.3s ease; display: flex; flex-direction: column; gap: 16px; }
  .mobile-sidebar.open { transform: translateX(0); }
  .mobile-close { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text); align-self: flex-end; margin-bottom: -8px; }
  .hidden { display: none !important; }
  @media (max-width: 900px) {
    .container { grid-template-columns: 1fr; padding: 16px; }
    .sidebar { display: none; }
    .product-grid { grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 12px; }
  }
</style>

  { id: 59, name: "Rampa Canina con Descanso",           price: 1680,  cat: "Parques Caninos", img: WIX+"94b53e_8edfa56433e644fe9758c7b9baaa525d~mv2.jpg" },
  { id: 60, name: "Doggie Steps – 4 Pasos",              price: 580,   cat: "Parques Caninos", img: WIX+"94b53e_064e0e6edd474c76882551560f00f9a6~mv2.png" },

const WHATSAPP_NUMBER = "50760903223";
let cart = {};
let activeCategory = "all";

function renderAll() {
  renderCatalog();
  renderSidebar(document.getElementById("desktopSidebar"));
  updateCartCount();
}

function getFilteredProducts() {
  const search = document.getElementById("searchInput").value.toLowerCase().trim();
  return products.filter(p => {
    const matchCat = activeCategory === "all" || p.cat === activeCategory;
    const matchSearch = !search || p.name.toLowerCase().includes(search) || p.cat.toLowerCase().includes(search);
    return matchCat && matchSearch;
  });
}

function renderCatalog() {
  const filtered = getFilteredProducts();
  const container = document.getElementById("catalogContainer");
  if (filtered.length === 0) { container.innerHTML = `<div class="no-results">😕 No se encontraron productos.</div>`; return; }
  const groups = {};
  filtered.forEach(p => { if (!groups[p.cat]) groups[p.cat] = []; groups[p.cat].push(p); });
  const catMeta = {
    "Parques Infantiles":    { icon: "🎠", label: "Parques Infantiles" },
    "Maquinas Biosaludables":{ icon: "💪", label: "Máquinas Biosaludables" },
    "Mobiliario Urbano":     { icon: "🏙️", label: "Mobiliario Urbano" },
    "Parques Caninos":       { icon: "🐕", label: "Parques Caninos" },
  };
  container.innerHTML = Object.entries(groups).map(([cat, prods]) => {
    const meta = catMeta[cat] || { icon: "📦", label: cat };
    return `<div class="category-group">
      <div class="category-header">
        <span class="category-icon">${meta.icon}</span>
        <span class="category-name">${meta.label}</span>
        <span class="category-count">${prods.length}</span>
      </div>
      <div class="product-grid">${prods.map(p => renderProductCard(p)).join("")}</div>
    </div>`;
  }).join("");
}

function renderProductCard(p) {
  const qty = cart[p.id] || 0;
  const inCart = qty > 0;
  return `
    <div class="product-card ${inCart ? "in-cart" : ""}" id="card-${p.id}">
      <div class="product-img">
        <img src="${p.img}" alt="${p.name}" loading="lazy">
        ${inCart ? `<span class="product-badge">✓ En lista</span>` : ""}
      </div>
      <div class="product-body">
        <div class="product-name">${p.name}</div>
        <div class="product-price">$${p.price.toLocaleString("en-US", {minimumFractionDigits: 2})} <span>USD</span></div>
      </div>
      <div class="product-controls">
        <div class="qty-wrapper">
          <button class="qty-btn" onclick="changeQty(${p.id}, -1)">−</button>
          <input class="qty-input" type="number" min="0" value="${qty}" id="qty-${p.id}" onchange="setQty(${p.id}, parseInt(this.value)||0)">
          <button class="qty-btn" onclick="changeQty(${p.id}, 1)">+</button>
        </div>
        <button class="add-btn ${inCart ? "added" : ""}" onclick="changeQty(${p.id}, 1)" id="addbtn-${p.id}">
          ${inCart ? "✓ Agregar más" : "+ Agregar"}
        </button>
      </div>
    </div>`;
}

function renderSidebar(container) {
  container.innerHTML = `${renderCartPanel()}${renderFormPanel()}`;
}

function renderCartPanel() {
  const cartEntries = Object.entries(cart).filter(([id,q]) => q > 0);
  const total = cartEntries.reduce((sum, [id,q]) => { const p = products.find(x => x.id == id); return sum + (p ? p.price * q : 0); }, 0);
  const itemsHtml = cartEntries.map(([id, qty]) => {
    const p = products.find(x => x.id == id);
    if (!p) return "";
    return `<div class="cart-item">
      <img src="${p.img}" alt="${p.name}" style="width:40px;height:40px;object-fit:cover;border-radius:6px;flex-shrink:0;">
      <div class="cart-item-info">
        <div class="cart-item-name">${p.name}</div>
        <div class="cart-item-sub">Cant: ${qty} × $${p.price.toLocaleString("en-US",{minimumFractionDigits:2})}</div>
      </div>
      <span class="cart-item-price">$${(p.price*qty).toLocaleString("en-US",{minimumFractionDigits:2})}</span>
      <button class="cart-remove" onclick="removeFromCart(${p.id})" title="Eliminar">✕</button>
    </div>`;
  }).join("");
  return `<div class="cart-panel">
    <div class="panel-header">🛒 Mi Cotización <span style="margin-left:auto;font-size:12px;opacity:.7">${cartEntries.length} producto(s)</span></div>
    <div class="cart-items">${itemsHtml}</div>
    <div class="cart-total">
      <span class="total-label">TOTAL ESTIMADO</span>
      <span class="total-value">$${total.toLocaleString("en-US",{minimumFractionDigits:2})}</span>
    </div>
  </div>`;
}

function renderFormPanel() {
  return `<div class="form-panel">
    <div class="panel-header">📋 Tus Datos de Contacto</div>
    <div class="form-body">
      <div class="form-group"><label>Nombre Completo *</label><input type="text" id="clientName" placeholder="Tu nombre" oninput="syncForm()"></div>
      <div class="form-group"><label>Teléfono / WhatsApp *</label><input type="tel" id="clientPhone" placeholder="+507 6000-0000" oninput="syncForm()"></div>
      <div class="form-group"><label>Correo Electrónico</label><input type="email" id="clientEmail" placeholder="correo@ejemplo.com" oninput="syncForm()"></div>
      <div class="form-group"><label>Empresa / Proyecto</label><input type="text" id="clientBusiness" placeholder="Empresa o nombre del proyecto" oninput="syncForm()"></div>
      <div class="form-group"><label>Notas adicionales</label><textarea id="clientNotes" placeholder="Ubicación, fecha estimada, preguntas..." oninput="syncForm()"></textarea></div>
    </div>
  </div>
  <button class="whatsapp-btn" onclick="sendWhatsApp()">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    Enviar Cotización por WhatsApp
  </button>`;
}

function changeQty(id, delta) {
  const current = cart[id] || 0;
  setQty(id, Math.max(0, current + delta));
}

function setQty(id, qty) {
  qty = Math.max(0, qty);
  if (qty === 0) { delete cart[id]; } else { cart[id] = qty; }
  const card = document.getElementById(`card-${id}`);
  if (card) {
    const inCart = qty > 0;
    card.className = `product-card ${inCart ? "in-cart" : ""}`;
    const qtyInput = document.getElementById(`qty-${id}`);
    if (qtyInput) qtyInput.value = qty;
    const addBtn = document.getElementById(`addbtn-${id}`);
    if (addBtn) { addBtn.className = `add-btn ${inCart ? "added" : ""}`; addBtn.textContent = inCart ? "✓ Agregar más" : "+ Agregar"; }
    const imgDiv = card.querySelector(".product-img");
    const badge = imgDiv.querySelector(".product-badge");
    if (inCart && !badge) imgDiv.insertAdjacentHTML("beforeend", `<span class="product-badge">✓ En lista</span>`);
    else if (!inCart && badge) badge.remove();
  }
  updateCartCount();
  refreshSidebars();
}

function removeFromCart(id) { setQty(id, 0); }

function updateCartCount() {
  document.getElementById("cartCount").textContent = Object.values(cart).reduce((s,q) => s+q, 0);
}

function refreshSidebars() {
  const ids = ['clientName','clientPhone','clientEmail','clientBusiness','clientNotes'];
  const desktop = document.getElementById("desktopSidebar");
  if (desktop) {
    const vals = ids.map(id => document.getElementById(id)?.value || "");
    renderSidebar(desktop);
    ids.forEach((id,i) => { document.getElementById(id).value = vals[i]; });
  }
  const mobile = document.getElementById("mobileSidebarContent");
  if (mobile && document.getElementById("mobileSidebar").classList.contains("open")) {
    const vals = ids.map(id => document.getElementById(id)?.value || "");
    renderSidebar(mobile);
    ids.forEach((id,i) => { document.getElementById(id).value = vals[i]; });
  }
}

function syncForm() {}

function setCategory(cat, btn) {
  activeCategory = cat;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderCatalog();
}

function filterProducts() { renderCatalog(); }

function openMobileCart() {
  renderSidebar(document.getElementById("mobileSidebarContent"));
  document.getElementById("overlay").classList.add("open");
  document.getElementById("mobileSidebar").classList.add("open");
}

function closeMobileCart() {
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("mobileSidebar").classList.remove("open");
}

function sendWhatsApp() {
  const name = document.getElementById("clientName")?.value?.trim();
  const phone = document.getElementById("clientPhone")?.value?.trim();
  const email = document.getElementById("clientEmail")?.value?.trim();
  const business = document.getElementById("clientBusiness")?.value?.trim();
  const notes = document.getElementById("clientNotes")?.value?.trim();
  if (!name) { alert("Por favor ingresa tu nombre."); return; }
  if (!phone) { alert("Por favor ingresa tu teléfono/WhatsApp."); return; }
  const cartEntries = Object.entries(cart).filter(([id,q]) => q > 0);
  if (cartEntries.length === 0) { alert("Agrega al menos un producto a tu cotización."); return; }
  let msg = `🎪 *SOLICITUD DE COTIZACIÓN - ECONOPLAY*\n━━━━━━━━━━━━━━━━━━━━\n\n`;
  msg += `👤 *Datos del Cliente:*\n• Nombre: ${name}\n• Teléfono: ${phone}\n`;
  if (email) msg += `• Email: ${email}\n`;
  if (business) msg += `• Empresa/Proyecto: ${business}\n`;
  msg += `\n📦 *Productos de Interés:*\n`;
  let total = 0;
  cartEntries.forEach(([id, qty]) => {
    const p = products.find(x => x.id == id);
    if (!p) return;
    const sub = p.price * qty;
    total += sub;
    msg += `• ${p.name} (x${qty}) — $${sub.toLocaleString("en-US",{minimumFractionDigits:2})} USD\n`;
  });
  msg += `\n💰 *Total Estimado: $${total.toLocaleString("en-US",{minimumFractionDigits:2})} USD*\n`;
  if (notes) msg += `\n📝 *Notas adicionales:*\n${notes}\n`;
  msg += `\n_Solicitud enviada desde el cotizador web de ECONOPLAY_`;
  window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, "_blank");
}

renderAll();
</script>
