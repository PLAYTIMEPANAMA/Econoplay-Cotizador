<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECONOPLAY - Cotizador</title>
<style>
  :root {
    --primary: #FF6B00;
    --primary-dark: #E05A00;
    --secondary: #1A3A5C;
    --accent: #4CAF50;
    --bg: #F5F7FA;
    --card-bg: #FFFFFF;
    --text: #2C3E50;
    --text-light: #6B7280;
    --border: #E5E7EB;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
    --shadow-hover: 0 6px 20px rgba(0,0,0,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--secondary);
    color: white;
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }
  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-icon {
    width: 44px;
    height: 44px;
    background: var(--primary);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
  }
  .logo-text h1 {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 1px;
    color: white;
  }
  .logo-text p {
    font-size: 11px;
    color: rgba(255,255,255,0.65);
    letter-spacing: 0.5px;
  }
  .cart-btn {
    background: var(--primary);
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 50px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .cart-btn:hover { background: var(--primary-dark); transform: translateY(-1px); }
  .cart-count {
    background: white;
    color: var(--primary);
    border-radius: 50%;
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 800;
  }

  /* MAIN LAYOUT */
  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px;
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 24px;
    align-items: start;
  }

  /* LEFT: CATALOG */
  .catalog-section { min-width: 0; }

  /* SEARCH & FILTER */
  .filter-bar {
    background: white;
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-input {
    flex: 1;
    min-width: 200px;
    padding: 10px 16px 10px 40px;
    border: 1.5px solid var(--border);
    border-radius: 50px;
    font-size: 14px;
    outline: none;
    transition: border 0.2s;
    position: relative;
  }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap::before {
    content: '🔍';
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
  }
  .search-input:focus { border-color: var(--primary); }
  .filter-tabs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .tab-btn {
    padding: 8px 16px;
    border-radius: 50px;
    border: 1.5px solid var(--border);
    background: white;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
    color: var(--text-light);
    white-space: nowrap;
  }
  .tab-btn.active {
    background: var(--secondary);
    border-color: var(--secondary);
    color: white;
  }
  .tab-btn:hover:not(.active) { border-color: var(--primary); color: var(--primary); }

  /* CATEGORY SECTIONS */
  .category-group { margin-bottom: 28px; }
  .category-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--border);
  }
  .category-icon { font-size: 22px; }
  .category-name {
    font-size: 17px;
    font-weight: 700;
    color: var(--secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .category-count {
    font-size: 12px;
    color: white;
    background: var(--primary);
    padding: 2px 8px;
    border-radius: 50px;
    font-weight: 600;
  }

  /* PRODUCT GRID */
  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
  }
  .product-card {
    background: white;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: all 0.25s;
    display: flex;
    flex-direction: column;
    border: 2px solid transparent;
  }
  .product-card:hover {
    box-shadow: var(--shadow-hover);
    transform: translateY(-3px);
  }
  .product-card.in-cart {
    border-color: var(--accent);
  }
  .product-img {
    height: 130px;
    background: linear-gradient(135deg, #f0f4f8 0%, #dde3ea 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    position: relative;
  }
  .product-badge {
    position: absolute;
    top: 8px;
    right: 8px;
    background: var(--accent);
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 50px;
  }
  .product-body {
    padding: 12px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .product-name {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
    line-height: 1.3;
  }
  .product-price {
    font-size: 16px;
    font-weight: 800;
    color: var(--primary);
    margin-top: auto;
    padding-top: 8px;
  }
  .product-price span { font-size: 11px; font-weight: 500; color: var(--text-light); }

  /* ADD/REMOVE CONTROLS */
  .product-controls {
    padding: 10px 12px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .qty-wrapper {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
  }
  .qty-btn {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: white;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    font-weight: 700;
    color: var(--text);
  }
  .qty-btn:hover { border-color: var(--primary); color: var(--primary); }
  .qty-input {
    width: 40px;
    text-align: center;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 4px;
    font-size: 14px;
    font-weight: 700;
    outline: none;
  }
  .qty-input:focus { border-color: var(--primary); }
  .add-btn {
    background: var(--secondary);
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 50px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 700;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .add-btn:hover { background: var(--primary); }
  .add-btn.added { background: var(--accent); }
  .add-btn.added:hover { background: #388E3C; }

  /* NO RESULTS */
  .no-results {
    text-align: center;
    padding: 40px;
    color: var(--text-light);
    font-size: 15px;
    grid-column: 1/-1;
  }

  /* RIGHT: SIDEBAR */
  .sidebar {
    position: sticky;
    top: 80px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* CART PANEL */
  .cart-panel {
    background: white;
    border-radius: 16px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .panel-header {
    background: var(--secondary);
    color: white;
    padding: 16px 20px;
    font-size: 15px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .cart-items {
    max-height: 280px;
    overflow-y: auto;
    padding: 12px;
  }
  .cart-items:empty::after {
    content: 'No hay productos seleccionados';
    display: block;
    text-align: center;
    color: var(--text-light);
    font-size: 13px;
    padding: 20px;
  }
  .cart-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px;
    border-radius: 10px;
    margin-bottom: 6px;
    background: var(--bg);
    font-size: 13px;
  }
  .cart-item-icon { font-size: 20px; }
  .cart-item-info { flex: 1; min-width: 0; }
  .cart-item-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cart-item-sub { color: var(--text-light); font-size: 11px; }
  .cart-item-price { font-weight: 700; color: var(--primary); white-space: nowrap; }
  .cart-remove {
    background: none;
    border: none;
    cursor: pointer;
    color: #EF4444;
    font-size: 16px;
    padding: 2px;
    line-height: 1;
  }
  .cart-total {
    padding: 14px 20px;
    border-top: 2px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .total-label { font-size: 14px; font-weight: 600; color: var(--text-light); }
  .total-value { font-size: 22px; font-weight: 800; color: var(--secondary); }

  /* FORM PANEL */
  .form-panel {
    background: white;
    border-radius: 16px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .form-body { padding: 16px; }
  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-light);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .form-group input, .form-group textarea {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 14px;
    outline: none;
    transition: border 0.2s;
    font-family: inherit;
    color: var(--text);
  }
  .form-group input:focus, .form-group textarea:focus { border-color: var(--primary); }
  .form-group textarea { resize: vertical; min-height: 70px; }

  /* WHATSAPP BUTTON */
  .whatsapp-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 16px;
    background: #25D366;
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.25s;
    text-decoration: none;
    letter-spacing: 0.3px;
  }
  .whatsapp-btn:hover {
    background: #1DA851;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(37,211,102,0.4);
  }
  .whatsapp-btn:disabled {
    background: #9CA3AF;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }
  .whatsapp-icon { font-size: 22px; }

  /* MOBILE OVERLAY CART */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
  }
  .overlay.open { display: block; }
  .mobile-sidebar {
    position: fixed;
    right: 0;
    top: 0;
    bottom: 0;
    width: min(360px, 100vw);
    background: var(--bg);
    z-index: 201;
    overflow-y: auto;
    padding: 16px;
    transform: translateX(100%);
    transition: transform 0.3s ease;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .mobile-sidebar.open { transform: translateX(0); }
  .mobile-close {
    background: none;
    border: none;
    font-size: 24px;
    cursor: pointer;
    color: var(--text);
    align-self: flex-end;
    margin-bottom: -8px;
  }

  /* UTILITY */
  .hidden { display: none !important; }

  @media (max-width: 900px) {
    .container {
      grid-template-columns: 1fr;
      padding: 16px;
    }
    .sidebar { display: none; }
    .product-grid {
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 12px;
    }
  }
</style>
</head>

function getFilteredProducts() {
  const search = document.getElementById("searchInput").value.toLowerCase().trim();
  return products.filter(p => {
    const matchCat = activeCategory === "all" || p.cat === activeCategory;
    const matchSearch = !search || p.name.toLowerCase().includes(search) || p.cat.toLowerCase().includes(search);
    return matchCat && matchSearch;
  });
}

function renderCatalog() {
  const filtered = getFilteredProducts();
  const container = document.getElementById("catalogContainer");

  if (filtered.length === 0) {
    container.innerHTML = `<div class="no-results">😕 No se encontraron productos. Intenta otra búsqueda.</div>`;
    return;
  }

  // Group by category
  const groups = {};
  filtered.forEach(p => {
    if (!groups[p.cat]) groups[p.cat] = [];
    groups[p.cat].push(p);
  });

  const catMeta = {
    "Parques Infantiles":    { icon: "🎠", label: "Parques Infantiles" },
    "Maquinas Biosaludables":{ icon: "💪", label: "Máquinas Biosaludables" },
    "Mobiliario Urbano":     { icon: "🏙️", label: "Mobiliario Urbano" },
    "Parques Caninos":       { icon: "🐕", label: "Parques Caninos" },
  };

  container.innerHTML = Object.entries(groups).map(([cat, prods]) => {
    const meta = catMeta[cat] || { icon: "📦", label: cat };
    return `
      <div class="category-group">
        <div class="category-header">
          <span class="category-icon">${meta.icon}</span>
          <span class="category-name">${meta.label}</span>
          <span class="category-count">${prods.length}</span>
        </div>
        <div class="product-grid">
          ${prods.map(p => renderProductCard(p)).join("")}
        </div>
      </div>`;
  }).join("");
}

function renderProductCard(p) {
  const qty = cart[p.id] || 0;
  const inCart = qty > 0;
  return `
    <div class="product-card ${inCart ? "in-cart" : ""}" id="card-${p.id}">
      <div class="product-img">
        <span>${p.icon}</span>
        ${inCart ? `<span class="product-badge">✓ En lista</span>` : ""}
      </div>
      <div class="product-body">
        <div class="product-name">${p.name}</div>
        <div class="product-price">$${p.price.toLocaleString("en-US", {minimumFractionDigits: 2})} <span>USD</span></div>
      </div>
      <div class="product-controls">
        <div class="qty-wrapper">
          <button class="qty-btn" onclick="changeQty(${p.id}, -1)">−</button>
          <input class="qty-input" type="number" min="0" value="${qty}" id="qty-${p.id}"
            onchange="setQty(${p.id}, parseInt(this.value)||0)">
          <button class="qty-btn" onclick="changeQty(${p.id}, 1)">+</button>
        </div>
        <button class="add-btn ${inCart ? "added" : ""}" onclick="changeQty(${p.id}, inCart ? 0 : 1)"
          id="addbtn-${p.id}">
          ${inCart ? "✓ Agregar más" : "+ Agregar"}
        </button>
      </div>
    </div>`;
}

function renderSidebar(container) {
  container.innerHTML = `
    ${renderCartPanel()}
    ${renderFormPanel()}

}

function renderCartPanel() {
  const cartEntries = Object.entries(cart).filter(([id,q]) => q > 0);
  const total = cartEntries.reduce((sum, [id,q]) => {
    const p = products.find(x => x.id == id);
    return sum + (p ? p.price * q : 0);
  }, 0);

  const itemsHtml = cartEntries.length === 0
    ? ""
    : cartEntries.map(([id, qty]) => {
        const p = products.find(x => x.id == id);
        if (!p) return "";
        return `
          <div class="cart-item">
            <span class="cart-item-icon">${p.icon}</span>
            <div class="cart-item-info">
              <div class="cart-item-name">${p.name}</div>
              <div class="cart-item-sub">Cant: ${qty} × $${p.price.toLocaleString("en-US", {minimumFractionDigits:2})}</div>
            </div>
            <span class="cart-item-price">$${(p.price*qty).toLocaleString("en-US",{minimumFractionDigits:2})}</span>
            <button class="cart-remove" onclick="removeFromCart(${p.id})" title="Eliminar">✕</button>
          </div>`;
      }).join("");

  return `
    <div class="cart-panel">
      <div class="panel-header">🛒 Mi Cotización <span style="margin-left:auto;font-size:12px;opacity:.7">${cartEntries.length} producto(s)</span></div>
      <div class="cart-items">${itemsHtml}</div>
      <div class="cart-total">
        <span class="total-label">TOTAL ESTIMADO</span>
        <span class="total-value">$${total.toLocaleString("en-US",{minimumFractionDigits:2})}</span>
      </div>
    </div>`;
}

// =====================
// CART LOGIC
// =====================
function changeQty(id, delta) {
  const current = cart[id] || 0;
  const newQty = Math.max(0, (delta === 0 ? 0 : current + delta));
  setQty(id, newQty);
}

function setQty(id, qty) {
  qty = Math.max(0, qty);
  if (qty === 0) {
    delete cart[id];
  } else {
    cart[id] = qty;
  }
  // Update the card in place
  const card = document.getElementById(`card-${id}`);
  if (card) {
    const inCart = qty > 0;
    card.className = `product-card ${inCart ? "in-cart" : ""}`;
    const qtyInput = document.getElementById(`qty-${id}`);
    if (qtyInput) qtyInput.value = qty;
    const addBtn = document.getElementById(`addbtn-${id}`);
    if (addBtn) {
      addBtn.className = `add-btn ${inCart ? "added" : ""}`;
      addBtn.textContent = inCart ? "✓ Agregar más" : "+ Agregar";
      addBtn.setAttribute("onclick", `changeQty(${id}, ${inCart ? 0 : 1})`);
    }
    // Update badge
    const img = card.querySelector(".product-img");
    const badge = img.querySelector(".product-badge");
    if (inCart && !badge) {
      img.insertAdjacentHTML("beforeend", `<span class="product-badge">✓ En lista</span>`);
    } else if (!inCart && badge) {
      badge.remove();
    }
  }
  updateCartCount();
  refreshSidebars();
}

function removeFromCart(id) {
  setQty(id, 0);
}

function updateCartCount() {
  const count = Object.values(cart).reduce((s,q) => s+q, 0);
  document.getElementById("cartCount").textContent = count;
}

function refreshSidebars() {
  const desktop = document.getElementById("desktopSidebar");
  if (desktop) {
    const name = document.getElementById("clientName")?.value || "";
    const phone = document.getElementById("clientPhone")?.value || "";
    const email = document.getElementById("clientEmail")?.value || "";
    const business = document.getElementById("clientBusiness")?.value || "";
    const notes = document.getElementById("clientNotes")?.value || "";
    renderSidebar(desktop);
    // Restore form values
    document.getElementById("clientName").value = name;
    document.getElementById("clientPhone").value = phone;
    document.getElementById("clientEmail").value = email;
    document.getElementById("clientBusiness").value = business;
    document.getElementById("clientNotes").value = notes;
  }
  // Also update mobile if open
  const mobile = document.getElementById("mobileSidebarContent");
  if (mobile && document.getElementById("mobileSidebar").classList.contains("open")) {
    const name = document.getElementById("clientName")?.value || "";
    const phone = document.getElementById("clientPhone")?.value || "";
    const email = document.getElementById("clientEmail")?.value || "";
    const business = document.getElementById("clientBusiness")?.value || "";
    const notes = document.getElementById("clientNotes")?.value || "";
    renderSidebar(mobile);
    document.getElementById("clientName").value = name;
    document.getElementById("clientPhone").value = phone;
    document.getElementById("clientEmail").value = email;
    document.getElementById("clientBusiness").value = business;
    document.getElementById("clientNotes").value = notes;
  }
}

function syncForm() { /* values stay in DOM */ }

// =====================
// FILTERS
// =====================
function setCategory(cat, btn) {
  activeCategory = cat;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderCatalog();
}

function filterProducts() {
  renderCatalog();
}

// =====================
// MOBILE CART
// =====================
function openMobileCart() {
  const mobile = document.getElementById("mobileSidebarContent");
  renderSidebar(mobile);
  document.getElementById("overlay").classList.add("open");
  document.getElementById("mobileSidebar").classList.add("open");
}

function closeMobileCart() {
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("mobileSidebar").classList.remove("open");
}

// =====================
// WHATSAPP
// =====================
function sendWhatsApp() {
  const name = document.getElementById("clientName")?.value?.trim();
  const phone = document.getElementById("clientPhone")?.value?.trim();
  const email = document.getElementById("clientEmail")?.value?.trim();
  const business = document.getElementById("clientBusiness")?.value?.trim();
  const notes = document.getElementById("clientNotes")?.value?.trim();

  if (!name) { alert("Por favor ingresa tu nombre."); return; }
  if (!phone) { alert("Por favor ingresa tu teléfono/WhatsApp."); return; }

  const cartEntries = Object.entries(cart).filter(([id,q]) => q > 0);
  if (cartEntries.length === 0) { alert("Agrega al menos un producto a tu cotización."); return; }

  let msg = `🎪 *SOLICITUD DE COTIZACIÓN - ECONOPLAY*\n`;
  msg += `━━━━━━━━━━━━━━━━━━━━\n\n`;
  msg += `👤 *Datos del Cliente:*\n`;
  msg += `• Nombre: ${name}\n`;
  msg += `• Teléfono: ${phone}\n`;
  if (email) msg += `• Email: ${email}\n`;
  if (business) msg += `• Empresa/Proyecto: ${business}\n`;
  msg += `\n📦 *Productos de Interés:*\n`;

  let total = 0;
  cartEntries.forEach(([id, qty]) => {
    const p = products.find(x => x.id == id);
    if (!p) return;
    const subtotal = p.price * qty;
    total += subtotal;
    msg += `• ${p.name} (x${qty}) — $${subtotal.toLocaleString("en-US",{minimumFractionDigits:2})} USD\n`;
  });

  msg += `\n💰 *Total Estimado: $${total.toLocaleString("en-US",{minimumFractionDigits:2})} USD*\n`;

  if (notes) {
    msg += `\n📝 *Notas adicionales:*\n${notes}\n`;
  }

  msg += `\n_Solicitud enviada desde el cotizador web de ECONOPLAY_`;

  const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;
  window.open(url, "_blank");
}
